<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Interactive algorithm visualizer for sorting and searching techniques with step-by-step animations and complexity analysis.">
    <title>Algorithm Visualizer — Interactive Sorting & Searching</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>

<body>
    <div id="app">
        <!-- ═══ Header ═══ -->
        <header class="header">
            <div class="header__logo">
                <div class="header__icon">⚡</div>
                <div>
                    <div class="header__title">Algorithm Visualizer</div>
                    <div class="header__subtitle">Interactive Sorting & Searching</div>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab active" id="tab-sorting">📊 Sorting</button>
                <button class="tab" id="tab-searching">🔍 Searching</button>
            </nav>
        </header>

        <!-- ═══ Main Content ═══ -->
        <div class="main">
            <!-- ── Visualization Panel ── -->
            <div class="card viz-panel">
                <div id="viz-container"></div>
                <div class="stats-bar">
                    <div class="stat">
                        <span class="stat__label">Comparisons</span>
                        <span class="stat__value" id="stat-comparisons">0</span>
                    </div>
                    <div class="stat" id="stat-swaps-label">
                        <span class="stat__label">Swaps</span>
                        <span class="stat__value swaps" id="stat-swaps">0</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </div>

            <!-- ── Sidebar ── -->
            <aside class="sidebar">
                <!-- Algorithm + Playback (always visible, most important) -->
                <div class="m3-surface">
                    <select class="m3-select" id="algo-select"></select>
                    <div class="m3-playback">
                        <button class="m3-btn m3-btn--filled" id="btn-play">
                            <span class="btn-icon">▶</span> Play
                        </button>
                        <button class="m3-btn m3-btn--tonal" id="btn-step">⏭</button>
                        <button class="m3-btn m3-btn--tonal" id="btn-reset">↺</button>
                    </div>
                    <div class="m3-speed-row">
                        <span class="m3-label-small">Speed</span>
                        <input type="range" id="speed-slider" min="1" max="100" value="5">
                        <span class="m3-label-value" id="speed-value">5x</span>
                    </div>
                    <div class="m3-shortcuts">
                        <kbd>Space</kbd> Play &nbsp; <kbd>→</kbd> Step &nbsp; <kbd>R</kbd> Reset
                    </div>
                </div>

                <!-- Data Controls (collapsible) -->
                <details class="m3-section" open>
                    <summary class="m3-section__header">Data</summary>
                    <div class="m3-section__body">
                        <div class="m3-toggle-group">
                            <button class="m3-chip active" id="toggle-random">🎲 Random</button>
                            <button class="m3-chip" id="toggle-custom">✏️ Custom</button>
                        </div>
                        <div id="slider-controls" class="m3-slider-stack">
                            <div class="m3-slider-row">
                                <span class="m3-label-small">Size</span>
                                <input type="range" id="size-slider" min="5" max="200" value="30">
                                <span class="m3-label-value" id="size-value">30</span>
                            </div>
                            <div class="m3-slider-row">
                                <span class="m3-label-small">Seed</span>
                                <input type="range" id="seed-slider" min="0" max="9999" value="42">
                                <span class="m3-label-value" id="seed-value">42</span>
                            </div>
                        </div>
                        <div id="custom-input-wrap" style="display:none;">
                            <input type="text" class="m3-input" id="custom-input"
                                placeholder="e.g. 64, 25, 12, 22, 11, 90"
                                value="64, 25, 12, 22, 11, 90, 45, 33, 78, 56">
                        </div>
                        <div class="search-target-wrap" id="search-target-wrap">
                            <div class="m3-slider-row">
                                <span class="m3-label-small">Target</span>
                                <input type="number" class="m3-input m3-input--compact" id="search-target"
                                    placeholder="Value">
                            </div>
                        </div>
                    </div>
                </details>

                <!-- Complexity (collapsible) -->
                <details class="m3-section">
                    <summary class="m3-section__header">Complexity</summary>
                    <div class="m3-section__body">
                        <div class="m3-complexity-grid">
                            <div class="m3-complexity-chip best">
                                <span class="m3-complexity-label">Best</span>
                                <span class="m3-complexity-value" id="complexity-best">—</span>
                            </div>
                            <div class="m3-complexity-chip avg">
                                <span class="m3-complexity-label">Avg</span>
                                <span class="m3-complexity-value" id="complexity-avg">—</span>
                            </div>
                            <div class="m3-complexity-chip worst">
                                <span class="m3-complexity-label">Worst</span>
                                <span class="m3-complexity-value" id="complexity-worst">—</span>
                            </div>
                            <div class="m3-complexity-chip space">
                                <span class="m3-complexity-label">Space</span>
                                <span class="m3-complexity-value" id="complexity-space">—</span>
                            </div>
                        </div>
                        <p class="m3-body-small" id="complexity-desc">Select an algorithm to see its description.</p>
                    </div>
                </details>

                <!-- Scaling Chart (collapsible) -->
                <details class="m3-section">
                    <summary class="m3-section__header">Scaling</summary>
                    <div class="m3-section__body">
                        <div class="scaling-chart-wrap">
                            <canvas class="scaling-canvas" id="scaling-canvas"></canvas>
                            <div class="chart-legend" id="chart-legend"></div>
                        </div>
                    </div>
                </details>
            </aside>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
